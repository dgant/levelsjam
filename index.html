<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Levels Jam 2026 prototype: a torchlit labyrinth rendered with three.js."
    />
    <link rel="preload" href="./textures/environment/overcast_soil_1k.hdr" as="fetch" crossorigin="anonymous" />
    <link rel="preload" href="./textures/fire/CampFire_l_nosmoke_front_Loop_01_4K_6x6.png" as="image" />
    <link rel="preload" href="./textures/puddle-ground/puddle_ground-1K/1K-puddle_Diffuse.jpg" as="image" />
    <link rel="preload" href="./textures/puddle-ground/puddle_ground-1K/1K-puddle_Normal.jpg" as="image" />
    <link rel="preload" href="./textures/puddle-ground/puddle_ground-1K/1K-puddle_Gloss.jpg" as="image" />
    <link rel="preload" href="./textures/puddle-ground/puddle_ground-1K/1K-puddle_Displacement.jpg" as="image" />
    <link rel="preload" href="./textures/puddle-ground/puddle_ground-1K/1K-puddle_AO.jpg" as="image" />
    <link rel="preload" href="./textures/stone-wall-29/stonewall_29-1K/stonewall_29_ambientocclusion-1K.png" as="image" />
    <link rel="preload" href="./textures/stone-wall-29/stonewall_29-1K/stonewall_29_basecolor-1K.png" as="image" />
    <link rel="preload" href="./textures/stone-wall-29/stonewall_29-1K/stonewall_29_normal-1K.png" as="image" />
    <link rel="preload" href="./textures/stone-wall-29/stonewall_29-1K/stonewall_29_roughness-1K.png" as="image" />
    <link rel="preload" href="./textures/stone-wall-29/stonewall_29-1K/stonewall_29_height-1K.png" as="image" />
    <link rel="preload" href="./textures/metal-13/metal_13-1K/metal_13_ambientocclusion-1K.png" as="image" />
    <link rel="preload" href="./textures/metal-13/metal_13-1K/metal_13_basecolor-1K.png" as="image" />
    <link rel="preload" href="./textures/metal-13/metal_13-1K/metal_13_normal-1K.png" as="image" />
    <link rel="preload" href="./textures/metal-13/metal_13-1K/metal_13_roughness-1K.png" as="image" />
    <link rel="preload" href="./textures/metal-13/metal_13-1K/metal_13_metallic-1K.png" as="image" />
    <link rel="preload" href="./textures/metal-13/metal_13-1K/metal_13_height-1K.png" as="image" />
    <title>Levels Jam 2026</title>
    <script>
      {
        const isLocalHost = ['127.0.0.1', 'localhost'].includes(window.location.hostname)
        const isDevServer = isLocalHost && ['4273', '5173'].includes(window.location.port)
        const addHeadPreload = (href, as, rel = 'preload') => {
          const link = document.createElement('link')
          link.rel = rel
          if (as) link.as = as
          if (as === 'fetch') link.crossOrigin = 'anonymous'
          link.href = href
          document.head.appendChild(link)
        }
        const requestedMazeId = new URLSearchParams(window.location.search).get('maze')

        if (!isDevServer) {
          addHeadPreload('./assets/app.js', 'script', 'modulepreload')
          addHeadPreload('./assets/bootstrapApp.js', null, 'modulepreload')
          addHeadPreload('./assets/app.css', 'style')
        }
        if (requestedMazeId) {
          addHeadPreload(`./maze-data/${requestedMazeId}.json`, 'fetch')
          addHeadPreload(`./maze-data/${requestedMazeId}/probe-assets.json`, 'fetch')
        }
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        background: #06080c;
      }

      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgb(33 38 46 / 90%), rgb(6 8 12 / 100%) 60%);
        font-family:
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      .app-shell-bootstrap {
        width: 100%;
        height: 100%;
        position: relative;
      }

      .loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 4;
        display: grid;
        place-content: center;
        gap: 0.35rem;
        background:
          linear-gradient(180deg, rgb(9 11 15 / 88%), rgb(4 6 9 / 94%));
        text-align: center;
      }

      .loading-overlay h1,
      .loading-overlay h2 {
        margin: 0;
        color: #f3eddc;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }

      .loading-overlay h1 {
        font-size: clamp(2.8rem, 6vw, 5.5rem);
        font-weight: 800;
      }

      .loading-overlay h2 {
        font-size: clamp(0.95rem, 2vw, 1.35rem);
        font-weight: 500;
        color: rgb(230 212 171 / 88%);
        display: inline-flex;
        justify-content: center;
        align-items: baseline;
      }

      .loading-overlay-dots {
        display: inline-flex;
        align-items: baseline;
        width: 3ch;
        text-align: left;
        white-space: nowrap;
        vertical-align: baseline;
      }

      .loading-overlay-dots::after {
        content: '...';
        display: inline-block;
        line-height: inherit;
        vertical-align: baseline;
        width: 1ch;
        overflow: hidden;
        animation: loading-overlay-dots 0.75s linear infinite;
      }

      @keyframes loading-overlay-dots {
        0%,
        24.99% {
          width: 1ch;
        }

        25%,
        49.99% {
          width: 2ch;
        }

        50%,
        74.99% {
          width: 3ch;
        }

        75%,
        100% {
          width: 1ch;
        }
      }
    </style>
  </head>
  <body>
    <div
      aria-hidden="false"
      class="app-shell app-shell-bootstrap"
      id="bootstrap-loading-shell"
    >
      <div
        aria-hidden="false"
        class="loading-overlay"
        data-loading-complete="false"
      >
        <h1>MINOTAUR</h1>
        <h2>
          <span>Entering the labyrinth</span>
          <span
            aria-hidden="true"
            class="loading-overlay-dots"
          ></span>
        </h2>
      </div>
    </div>
    <div id="root">
      <div class="app-shell app-shell-bootstrap">
        <div
          aria-hidden="false"
          class="loading-overlay"
          data-loading-complete="false"
        >
          <h1>MINOTAUR</h1>
          <h2>
            <span>Entering the labyrinth</span>
            <span
              aria-hidden="true"
              class="loading-overlay-dots"
            ></span>
          </h2>
        </div>
      </div>
    </div>
    <script>
      const isLocalHost = ['127.0.0.1', 'localhost'].includes(window.location.hostname)
      const isDevServer =
        isLocalHost &&
        ['4273', '5173'].includes(window.location.port)
      const preload = (href, as, rel = 'preload') => {
        const link = document.createElement('link')
        link.rel = rel
        if (as) {
          link.as = as
        }
        if (as === 'fetch') {
          link.crossOrigin = 'anonymous'
        }
        link.href = href
        document.head.appendChild(link)
      }
      const staticBase = isDevServer ? '/' : './'
      const criticalAssets = [
        ['textures/environment/overcast_soil_1k.hdr', 'fetch'],
        ['textures/fire/CampFire_l_nosmoke_front_Loop_01_4K_6x6.png', 'image'],
        ['textures/puddle-ground/puddle_ground-1K/1K-puddle_Diffuse.jpg', 'image'],
        ['textures/puddle-ground/puddle_ground-1K/1K-puddle_Normal.jpg', 'image'],
        ['textures/puddle-ground/puddle_ground-1K/1K-puddle_Gloss.jpg', 'image'],
        ['textures/puddle-ground/puddle_ground-1K/1K-puddle_Displacement.jpg', 'image'],
        ['textures/puddle-ground/puddle_ground-1K/1K-puddle_AO.jpg', 'image'],
        ['textures/stone-wall-29/stonewall_29-1K/stonewall_29_ambientocclusion-1K.png', 'image'],
        ['textures/stone-wall-29/stonewall_29-1K/stonewall_29_basecolor-1K.png', 'image'],
        ['textures/stone-wall-29/stonewall_29-1K/stonewall_29_normal-1K.png', 'image'],
        ['textures/stone-wall-29/stonewall_29-1K/stonewall_29_roughness-1K.png', 'image'],
        ['textures/stone-wall-29/stonewall_29-1K/stonewall_29_height-1K.png', 'image'],
        ['textures/metal-13/metal_13-1K/metal_13_ambientocclusion-1K.png', 'image'],
        ['textures/metal-13/metal_13-1K/metal_13_basecolor-1K.png', 'image'],
        ['textures/metal-13/metal_13-1K/metal_13_normal-1K.png', 'image'],
        ['textures/metal-13/metal_13-1K/metal_13_roughness-1K.png', 'image'],
        ['textures/metal-13/metal_13-1K/metal_13_metallic-1K.png', 'image'],
        ['textures/metal-13/metal_13-1K/metal_13_height-1K.png', 'image']
      ]
      const requestedMazeId = new URLSearchParams(window.location.search).get('maze')

      if (!isDevServer) {
        preload('./assets/bootstrapApp.js', null, 'modulepreload')
        preload('./assets/app.css', 'style')
      }

      if (requestedMazeId) {
        preload(`${staticBase}maze-data/${requestedMazeId}.json`, 'fetch')
        preload(`${staticBase}maze-data/${requestedMazeId}/probe-assets.json`, 'fetch')
      }

      for (const [assetPath, as] of criticalAssets) {
        preload(`${staticBase}${assetPath}`, as)
      }

      const startApp = () => {
        if (!isDevServer) {
          const stylesheet = document.createElement('link')
          stylesheet.rel = 'stylesheet'
          stylesheet.href = './assets/app.css'
          document.head.appendChild(stylesheet)
        }

        const script = document.createElement('script')
        script.type = 'module'
        script.src = isDevServer ? '/src/main.tsx' : './assets/app.js'
        document.body.appendChild(script)
      }

      window.requestAnimationFrame(startApp)
    </script>
  </body>
</html>
